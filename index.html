<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang web điểm danh</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <div class="container">
        <form class="loginBox" id="loginForm">
            <h2 class="title">Đăng Nhập</h2>
            <label for="email" class="sr-only">Email</label>
            <input type="email" id="email" class="input" placeholder="Email" autocomplete="email" required>
            <label for="password" class="sr-only">Mật khẩu</label>
            <input type="password" id="password" class="input" placeholder="Mật khẩu" autocomplete="current-password" required>
            <button type="submit" id="loginButton" class="button">Đăng nhập</button>
        </form>
    </div>
</body>
</html>
